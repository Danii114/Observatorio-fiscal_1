name: SECOP Automatizado

# Ejecutar todos los días a las 11:00 UTC
on:
  schedule:
    - cron: '0 11 * * *'
  workflow_dispatch:

# Forzar Node.js 24 y evitar advertencias
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run-secoppipeline:
    runs-on: ubuntu-latest

    steps:
      # Clonar repositorio
      - name: 📥 Clonar repositorio
        uses: actions/checkout@v3

      # Instalar Python
      - name: 🐍 Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      # Instalar librerías necesarias
      - name: 📦 Instalar librerías
        run: |
          pip install pandas requests pyarrow

      # Ejecutar script de descarga
      - name: 🚀 Ejecutar descarga 3 meses
        run: python scripts/descarga_3mes_datos.py

      # Subir cambios automáticamente
      - name: 💾 Subir cambios automáticamente
        run: |
          git add .
          git commit -m "Actualización automática datos SECOP" || echo "No changes to commit"
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
