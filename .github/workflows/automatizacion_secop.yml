name: SECOP Automatizado

# Ejecutar todos los días a las 11:00 UTC
on:
  schedule:
    - cron: '0 11 * * *'
  workflow_dispatch:

# Forzar Node.js 24
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run-secoppipeline:
    runs-on: ubuntu-latest

    steps:
      # Clonar repositorio
      - name: 📥 Clonar repositorio
        uses: actions/checkout@v3

      # Configurar Python
      - name: 🐍 Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      # Instalar librerías necesarias
      - name: 📦 Instalar librerías
        run: |
          pip install --upgrade pip
          pip install pandas requests pyarrow

      # Ejecutar script de descarga
      - name: 🚀 Ejecutar descarga 3 meses
        run: python scripts/descarga_3mes_datos.py

      # Subir cambios automáticamente sin fallar si no hay cambios
      - name: 💾 Subir cambios automáticamente
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          # Traer cambios del remoto primero
          git fetch origin main
          git reset --soft origin/main

          git add .
          # Solo hacer commit si hay cambios
          git diff-index --quiet HEAD || git commit -m "Actualización automática datos SECOP"
          # Push usando token seguro
          git push https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git
