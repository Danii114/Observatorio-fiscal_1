name: SECOP Automatizado

on:
  schedule:
    - cron: '0 11 * * *'  # Ejecuta todos los días a las 11:00 UTC
  workflow_dispatch:

# Forzar Node.js 24 y evitar advertencias
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run-secoppipeline:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Clonar repositorio
      - name: 📥 Clonar repositorio
        uses: actions/checkout@v3

      # 2️⃣ Instalar Python
      - name: 🐍 Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      # 3️⃣ Instalar librerías necesarias
      - name: 📦 Instalar librerías
        run: |
          pip install pandas requests pyarrow

      # 4️⃣ Ejecutar script de descarga
      - name: 🚀 Ejecutar descarga 3 meses
        run: python scripts/descarga_3mes_datos.py

      # 5️⃣ Subir cambios automáticamente usando token seguro
      - name: 💾 Subir cambios automáticamente
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add .
          git diff-index --quiet HEAD || git commit -m "Actualización automática datos SECOP"
          git push https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.gt
