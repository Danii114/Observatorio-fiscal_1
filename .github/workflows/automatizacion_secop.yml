name: SECOP Automatizado

on:
  schedule:
    - cron: '0 11 * * *'  # todos los días
  workflow_dispatch:

jobs:
  run-secoppipeline:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Clonar repositorio
        uses: actions/checkout@v3

      - name: 🐍 Instalar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 📦 Instalar librerías
        run: |
          pip install pandas requests pyarrow

      - name: 🚀 Ejecutar descarga 3 meses
        run: python scripts/descarga_3mes_datos.py

      - name: 💾 Subir cambios
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add .
          git commit -m "Actualización automática datos SECOP" || echo "No changes"
          git push
